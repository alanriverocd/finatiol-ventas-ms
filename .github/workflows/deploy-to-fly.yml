name: Deploy to Fly

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "${HOME}/.fly/bin" >> $GITHUB_PATH

      - name: Authenticate Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl auth login --access-token $FLY_API_TOKEN

      - name: Deploy to Fly
        env:
          FLY_APP: ${{ secrets.FLY_APP }}
        run: |
          flyctl deploy --app $FLY_APP --config fly.toml --remote-only
