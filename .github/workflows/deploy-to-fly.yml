name: Deploy to Fly

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flyctl
        uses: superfly/flyctl-actions@v1

      - name: Authenticate Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "$FLY_API_TOKEN" | flyctl auth token

      - name: Deploy to Fly
        env:
          FLY_APP: ${{ secrets.FLY_APP }}
        run: |
          flyctl deploy --app $FLY_APP --config fly.toml --remote-only
